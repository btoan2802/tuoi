<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>máy tính tuổi</title>
</head>
<body>
    <h1>Máy tính tuổi thông minh</h1>
    <input type="text" id="age" placeholder="Nhập tuổi của bạn">
    <button id="calculate">Tính</button>
    <p id="message"></p>

    <script>
        const ageInput = document.getElementById('age');
        const calculateBtn = document.getElementById('calculate');
        const messageEl = document.getElementById('message');

        calculateBtn.addEventListener('click', () => {
            const ageValue = ageInput.value.trim();

            if (!ageValue) {
                messageEl.textContent = 'không nhập tuổi tính kiểu lồn gì?';
                messageEl.style.color = 'red';
                return;
            }

            const age = Number(ageValue);
            if (!Number.isFinite(age) || age <= 0) {
                messageEl.textContent = 'Vui lòng nhập một số tuổi hợp lệ.';
                messageEl.style.color = 'red';
                return;
            }

            if (age === 36) {
                messageEl.textContent = 'mày sống đủ lâu để thành người Thanh Hoá';
            } else {
                messageEl.textContent = 'mày đã sống chật đất tận ' + age + ' năm trên cõi đời này rồi';
            }
            messageEl.style.color = 'green';
        });
    </script>
</body>
</html>
